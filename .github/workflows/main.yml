name: Angular

on: 
  push: 
    branches: [ main ]

jobs:
  build-angular:
    runs-on: ubuntu-latest

    steps:
       - uses: actions/checkout@v6.0.2
       - name: Setup Node JS
         uses: actions/setup-node@v6.4.0
         with:
           node-version: 22.x
       - name: Install Depdendencies
         run: npm install
       - name: Build Angular Name
         run: npm run build
